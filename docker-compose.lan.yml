# Snak'r — LAN overlay: run WITHOUT the bundled Caddy and expose the app
# directly on the local network, for setups where an EXTERNAL reverse proxy
# (Nginx, Nginx Proxy Manager, Traefik…) terminates TLS and forwards here.
#
#   docker compose -f docker-compose.yml -f docker-compose.lan.yml up -d --build
#
# The app then answers on http://<lan-ip-of-this-machine>:3000 — point the
# external proxy at that address. Cookies follow the APP_URL scheme: with an
# https:// APP_URL they are Secure (browse via the proxy's HTTPS URL); with an
# http:// APP_URL plain-HTTP access works too (LAN-only setups).
services:
  app:
    # Replaces (not appends to) the loopback-only binding of the base file.
    ports: !override
      - "3000:3000"

  caddy:
    # Parked under a never-enabled profile so `up` doesn't start it — TLS and
    # ports 80/443 belong to the external proxy in this setup.
    profiles: ["external-proxy-instead"]
