# Snak'r — one-command self-hosted stack: postgres + app.
#   docker compose up -d --build
# Postgres comes up first and is health-gated; the app entrypoint then migrates,
# seeds the admin, and serves on :3000.
#
# DEFAULT = "external proxy" mode: the app is exposed on :3000 for an EXTERNAL
# reverse proxy (Nginx / NPM / Traefik…) that terminates TLS and forwards here.
# The bundled Caddy is PARKED behind the `with-caddy` profile — enable it only if
# you want Caddy to own TLS on 80/443 instead of an external proxy:
#   docker compose --profile with-caddy up -d --build   (then set APP_DOMAIN)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Doubled $$ so compose passes the literal $POSTGRES_* to the shell inside
      # the container (not interpolated at compose-parse time).
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Compose-composed DB URL wins over any DATABASE_URL in .env: it targets
      # the `postgres` service host, not localhost.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      STORAGE_ROOT: /data/uploads
      # Alpine's musl ffmpeg (installed in the image) — video poster frames.
      FFMPEG_PATH: /usr/bin/ffmpeg
    depends_on:
      postgres:
        # Waits for Postgres to accept connections, not just for the container to start.
        condition: service_healthy
    volumes:
      - uploads:/data
    ports:
      # Exposed on all interfaces so an EXTERNAL reverse proxy (fusionbase nginx,
      # NPM, Traefik…) that terminates TLS can forward here over http://<host>:3000.
      # If you enable the `with-caddy` profile instead, Caddy fronts TLS on 80/443
      # and you can tighten this to "127.0.0.1:3000:3000".
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Grace period covering migrate + seed on first boot before health counts.
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    # Parked by default — an external proxy terminates TLS in the standard setup.
    # Start it with `docker compose --profile with-caddy up -d` to let Caddy own
    # TLS on 80/443 (then set APP_DOMAIN + drop `tls internal` for a public FQDN).
    profiles: ["with-caddy"]
    restart: unless-stopped
    depends_on:
      - app
    environment:
      # Drives the Caddyfile site address. Defaults to localhost (internal TLS);
      # set APP_DOMAIN to a public FQDN for automatic Let's Encrypt certificates.
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
